<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Leave Scheduler Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

<div class="max-w-7xl mx-auto p-6 space-y-8">

    <header class="bg-white p-6 rounded-xl shadow-xs border border-slate-200 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold text-slate-900">Team Leave Scheduler</h1>
        </div>
    </header>

    <!-- Dynamic Feedback Alert Area -->
    <div id="alertArea" class="hidden max-w-full p-4 rounded-lg text-sm font-medium"></div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

        <!-- Left Side: Interactive Request & Operations Panels -->
        <div class="space-y-6 lg:col-span-1">

            <!-- Submit Leave Request -->
            <section class="bg-white p-6 rounded-xl shadow-xs border border-slate-200">
                <h2 class="text-lg font-semibold text-slate-900 mb-4">Submit Leave Request</h2>
                <form id="leaveForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-500 uppercase mb-1">Employee Name</label>
                        <!-- Swapped input type="number" with a clean dynamic dropdown -->
                        <select id="employeeId" required class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-white">
                            <option value="" disabled selected>Loading staff roster...</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-medium text-slate-500 uppercase mb-1">Start Date</label>
                            <input type="date" id="startDate" required class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 uppercase mb-1">End Date</label>
                            <input type="date" id="endDate" required class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-md transition-colors text-sm shadow-xs cursor-pointer">
                        Submit Request
                    </button>
                </form>
            </section>

            <!-- Approvals Triage Queue -->
            <section class="bg-white p-6 rounded-xl shadow-xs border border-slate-200">
                <h2 class="text-lg font-semibold text-slate-900 mb-4">Pending Approvals Queue</h2>
                <div id="pendingQueue" class="space-y-3 max-h-96 overflow-y-auto pr-1">
                    <!-- Rendered dynamically -->
                </div>
            </section>
        </div>


        <div class="lg:col-span-2 space-y-4">
            <section class="bg-white p-6 rounded-xl shadow-xs border border-slate-200">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-semibold text-slate-900">30-Day Outage Forecast</h2>
                    <div class="flex items-center gap-4 text-xs text-slate-500">
                        <span class="flex items-center gap-1"><span class="w-3 h-3 bg-blue-100 border border-blue-300 rounded"></span> Absent</span>
                        <span class="flex items-center gap-1"><span class="w-3 h-3 bg-slate-100 border border-slate-200 rounded"></span> Full Strength</span>
                    </div>
                </div>

                <div id="calendarGrid" class="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-[620px] overflow-y-auto pr-2">
                    <!-- Rendered dynamically -->
                </div>
            </section>
        </div>

    </div>
</div>

<!-- UI State Engine Scripts -->
<script>
    const API_BASE = "http://localhost:8080/api/leaves";

    // Setup Event Listeners
    document.getElementById('leaveForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        showAlert('', false);

        const params = new URLSearchParams({
            employeeId: document.getElementById('employeeId').value,
            startDate: document.getElementById('startDate').value,
            endDate: document.getElementById('endDate').value
        });

        try {
            const response = await fetch(`${API_BASE}/submit?${params.toString()}`, { method: 'POST' });
            if (!response.ok) throw new Error(await response.text());

            showAlert('Leave request queued successfully!', false, 'success');
            document.getElementById('leaveForm').reset();
            refreshDashboard();
        } catch (err) {
            showAlert(`Submission Rejected: ${err.message}`, true);
        }
    });

    async function evaluateRequest(requestId, decision) {
        showAlert('', false);
        const params = new URLSearchParams({ requestId, decision });

        try {
            const response = await fetch(`${API_BASE}/evaluate?${params.toString()}`, { method: 'POST' });
            if (!response.ok) throw new Error(await response.text());

            showAlert(`Request successfully ${decision.toLowerCase()}!`, false, 'success');
            refreshDashboard();
        } catch (err) {
            showAlert(`Triage Error: ${err.message}`, true);
        }
    }

    // Fetch active roster and dynamically populate the selector with employee names
    async function loadEmployeeSelector() {
        const selectEl = document.getElementById('employeeId');
        try {
            const res = await fetch(`${API_BASE}/employees`);
            const employees = await res.json();

            if (employees.length === 0) {
                selectEl.innerHTML = `<option value="" disabled>No employees found. Please register staff first.</option>`;
                return;
            }

            selectEl.innerHTML = '<option value="" disabled selected>Choose Employee Name...</option>' +
                employees.map(emp => `<option value="${emp.id}">${emp.name} (${emp.team})</option>`).join('');
        } catch (err) {
            selectEl.innerHTML = `<option value="" disabled>Error fetching team list.</option>`;
        }
    }

    async function loadPendingQueue() {
        const queueEl = document.getElementById('pendingQueue');
        try {
            const res = await fetch(`${API_BASE}/pending`);
            const requests = await res.json();

            if (requests.length === 0) {
                queueEl.innerHTML = `<div class="text-sm text-slate-400 py-4 text-center border border-dashed border-slate-200 rounded-lg">No requests awaiting triage.</div>`;
                return;
            }

            queueEl.innerHTML = requests.map(req => `
                <div class="p-3 bg-slate-50 rounded-lg border border-slate-200 text-xs space-y-2">
                    <div class="flex justify-between items-start">
                        <div>
                            <strong class="text-sm text-slate-900">${req.employee.name}</strong>
                            <p class="text-slate-500">${req.employee.team}</p>
                        </div>
                        <span class="bg-amber-100 text-amber-800 px-2 py-0.5 rounded text-[10px] font-semibold">${req.type}</span>
                    </div>
                    <p class="text-slate-600">📅 ${req.startDate} to ${req.endDate}</p>
                    <div class="flex gap-2 pt-1">
                        <button onclick="evaluateRequest(${req.id}, 'APPROVED')" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-1 rounded transition-colors cursor-pointer">Approve</button>
                        <button onclick="evaluateRequest(${req.id}, 'REJECTED')" class="flex-1 bg-rose-600 hover:bg-rose-700 text-white font-medium py-1 rounded transition-colors cursor-pointer">Reject</button>
                    </div>
                </div>
            `).join('');
        } catch (err) {
            queueEl.innerHTML = `<p class="text-xs text-rose-500">Failed to load pending queue.</p>`;
        }
    }

    async function loadCalendarGrid() {
        const gridEl = document.getElementById('calendarGrid');
        try {
            const res = await fetch(`${API_BASE}/calendar`);
            const gridData = await res.json();

            gridEl.innerHTML = Object.entries(gridData).map(([dateStr, employees]) => {
                const hasAbsences = employees.length > 0;
                const d = new Date(dateStr);
                const formattedDate = d.toLocaleDateString('en-US', { day: '2-digit', month: 'short', weekday: 'short' });

                return `
                    <div class="p-3 rounded-lg border flex flex-col justify-between min-h-24 transition-all ${hasAbsences ? 'bg-blue-50/40 border-blue-200 shadow-2xs' : 'bg-slate-50/50 border-slate-200'}">
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-semibold text-sm text-slate-700">${formattedDate}</span>
                            ${hasAbsences ? `<span class="bg-blue-600 text-white px-1.5 py-0.5 rounded text-[10px] font-bold">${employees.length} Out</span>` : ''}
                        </div>
                        <div class="space-y-1 flex-1">
                            ${!hasAbsences ? '<div class="text-xs text-slate-400 italic pt-2">Full team available</div>' :
                                employees.map(emp => `<div class="text-xs bg-white text-blue-900 border border-blue-200 px-2 py-1 rounded-sm shadow-3xs font-medium">${emp}</div>`).join('')
                            }
                        </div>
                    </div>
                `;
            }).join('');
        } catch (err) {
            gridEl.innerHTML = `<p class="text-xs text-rose-500">Failed to load forecast grid.</p>`;
        }
    }

    function showAlert(msg, isError, type = 'danger') {
        const el = document.getElementById('alertArea');
        if (!msg) {
            el.classList.add('hidden');
            return;
        }
        el.classList.remove('hidden', 'bg-rose-50', 'text-rose-800', 'border-rose-200', 'bg-emerald-50', 'text-emerald-800', 'border-emerald-200');

        if (isError || type === 'danger') {
            el.classList.add('bg-rose-50', 'text-rose-800', 'border', 'border-rose-200');
        } else {
            el.classList.add('bg-emerald-50', 'text-emerald-800', 'border', 'border-emerald-200');
        }
        el.textContent = msg;
    }

    function refreshDashboard() {
        loadEmployeeSelector();
        loadPendingQueue();
        loadCalendarGrid();
    }

    // Initialize App on load
    refreshDashboard();
</script>
</body>
</html>
